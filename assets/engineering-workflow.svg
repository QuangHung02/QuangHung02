<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="270" viewBox="0 0 1200 270" role="img" aria-labelledby="title description">
  <title id="title">Software engineering workflow</title>
  <desc id="description">A continuous pipeline from user requirements to product and application flows, software systems, and automation and AI workflows, with an iteration loop.</desc>
  <style>
    .bg{fill:#f8fafc;stroke:#dbe3ee}.ink{fill:#182235}.muted{fill:#64748b}.blue{fill:#2563eb;color:#2563eb}.cyan{fill:#0891b2;color:#0891b2}.node{fill:#fff;stroke:#dbe3ee}.icon{fill:#eff6ff;stroke:#bfdbfe}.flow{fill:none;stroke:#7fb3e8;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}.dot{fill:#2563eb}
